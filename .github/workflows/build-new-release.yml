name: Build New Release

on:
  repository_dispatch:
    types: [build_new_release]

  workflow_dispatch:
    inputs:
      rawMarkdown:
        description: 'Raw markdown for the release description'
        required: false
        default: ''
        type: string
      webReleaseTagName:
        description: 'The tag of the default release version'
        required: false
        default: ''
        type: string
      prerelease:
        description: 'Set if the release should be marked as a prerelease'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  TIZEN_STUDIO_VER: 4.5.1

jobs:
  run-info:
    name: Show run info
    runs-on: ubuntu-latest

    outputs:
      date_tag: ${{ steps.variables.outputs.date_tag }}
      date_pretty: ${{ steps.variables.outputs.date_pretty }}
      date: ${{ steps.variables.outputs.date }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout to repository
        uses: actions/checkout@v6

      - name: Set Variables
        id: variables
        run: |
          echo "date_tag=$(date +'%Y-%m-%d-%H%M')" >> $GITHUB_OUTPUT
          echo "date_pretty=$(date +'%Y/%m/%d @ %Hh%M')" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

      - name: Set matrix data
        id: set-matrix
        run: echo "matrix=$(jq -c . < ./matrix.json)" >> $GITHUB_OUTPUT

      - name: Output Inputs
        run: |
          echo "$INPUTS_JSON"
          echo "$BUILD_INFO" >> $GITHUB_STEP_SUMMARY
        env:
          INPUTS_JSON: ${{ toJSON(github.event.inputs) }}
          BUILD_INFO: |
            ${{ github.event.inputs.rawMarkdown }}

            Look at the [readme](https://github.com/${{ github.repository }}/blob/main/README.md) for information about the different versions.

            ## Stable Version
            Stremio-Web: [${{ github.event.inputs.webReleaseTagName }}](https://github.com/Stremio/stremio-web/releases/tag/${{ github.event.inputs.webReleaseTagName }})

            ## Main Version
            Stremio-Web: [main](https://github.com/Stremio/stremio-web)

  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ubuntu-latest
    needs: run-info
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.run-info.outputs.matrix) }}

    steps:
      - run: env

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js environment
        if: ${{ matrix.source_build == true }}
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm
        if: ${{ matrix.source_build == true }}
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Needed packages
        run: sudo apt-get install -y expect

      - name: Download Tizen-Studio
        run: |
          curl -o tizen-installer "https://download.tizen.org/sdk/Installer/tizen-studio_${TIZEN_STUDIO_VER}/web-cli_Tizen_Studio_${TIZEN_STUDIO_VER}_ubuntu-64.bin"

      - name: Install Tizen-Studio
        run: |
          chmod +x tizen-installer
          ./tizen-installer --accept-license "${GITHUB_WORKSPACE}/tizen-studio"
          rm ./tizen-installer
          echo 'export PATH=$PATH:/tizen-studio/tools/ide/bin' >> .bashrc

      - name: Generate Tizen Certificate
        run: |
          # Generate a self-signed certificate for Tizen signing
          openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
            -keyout tizen-key.pem -out tizen-cert.pem \
            -subj "/CN=Stremio Tizen Build"
          openssl pkcs12 -export -out tizencert.p12 \
            -inkey tizen-key.pem -in tizen-cert.pem \
            -password pass:1234 \
            -certpbe PBE-SHA1-3DES -keypbe PBE-SHA1-3DES -macalg SHA1

      - name: Prepare Tizen Certificate
        run: |
          ./tizen-studio/tools/ide/bin/tizen security-profiles add -n Stremio -a "${GITHUB_WORKSPACE}/tizencert.p12" -p 1234
          ./tizen-studio/tools/ide/bin/tizen cli-config "profiles.path=${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml"
          chmod 755 "${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml"

      - name: Clone stremio-web
        if: ${{ matrix.source_build == true }}
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.repository }}
          path: 'stremio-web'
          ref: ${{ matrix.tag }}

      - name: Build stremio-web
        if: ${{ matrix.source_build == true }}
        run: |
          cd stremio-web
          pnpm install --no-frozen-lockfile
          pnpm run build
          echo "BUILD_DIR=$(ls -d ${GITHUB_WORKSPACE}/stremio-web/build ${GITHUB_WORKSPACE}/stremio-web/dist 2>/dev/null | head -1)" >> $GITHUB_ENV

      - name: Prepare Tizen app directory (source build)
        if: ${{ matrix.source_build == true }}
        run: |
          mkdir -p tizen-app
          cp -r ${BUILD_DIR}/* tizen-app/

          # Copy config.xml template
          TEMPLATE="tizen/templates/config-${{ matrix.tizen_template }}.xml"
          if [ ! -f "$TEMPLATE" ]; then
            TEMPLATE="tizen/templates/config-standard.xml"
          fi
          cp "$TEMPLATE" tizen-app/config.xml

          # Substitute template variables
          sed -i 's|{{APP_ID}}|${{ matrix.app_id }}|g' tizen-app/config.xml
          sed -i 's|{{PACKAGE_ID}}|${{ matrix.package_id }}|g' tizen-app/config.xml
          sed -i 's|{{APP_NAME}}|Stremio|g' tizen-app/config.xml
          sed -i 's|{{VERSION}}|1.0.0|g' tizen-app/config.xml

          # Copy icon if available
          if [ -f "tizen/icons/icon.png" ]; then
            cp tizen/icons/icon.png tizen-app/icon.png
          fi

          # Inject TV remote key handler
          if [ -f "tizen/templates/tizen-inject.js" ]; then
            cp tizen/templates/tizen-inject.js tizen-app/tizen-inject.js
            if [ -f "tizen-app/index.html" ]; then
              sed -i 's|</head>|<script src="tizen-inject.js"></script></head>|' tizen-app/index.html
            fi
          fi

          # Apply patches if any exist
          if [ -d "patches/stremio-web" ]; then
            for patch in patches/stremio-web/*.patch; do
              [ -f "$patch" ] || continue
              echo "Applying patch: $(basename "$patch")"
              cd stremio-web && git apply "../$patch" || echo "Patch failed: $(basename "$patch")"
              cd ..
            done
          fi

      - name: Prepare Tizen app directory (wrapper build)
        if: ${{ matrix.source_build == false }}
        run: |
          mkdir -p tizen-app

          # Copy config.xml template
          TEMPLATE="tizen/templates/config-${{ matrix.tizen_template }}.xml"
          cp "$TEMPLATE" tizen-app/config.xml

          # Substitute template variables
          sed -i 's|{{APP_ID}}|${{ matrix.app_id }}|g' tizen-app/config.xml
          sed -i 's|{{PACKAGE_ID}}|${{ matrix.package_id }}|g' tizen-app/config.xml
          sed -i 's|{{APP_NAME}}|Stremio|g' tizen-app/config.xml
          sed -i 's|{{VERSION}}|1.0.0|g' tizen-app/config.xml

          # Copy wrapper HTML template
          INDEX_TEMPLATE="tizen/templates/index-${{ matrix.tizen_template }}.html"
          if [ -f "$INDEX_TEMPLATE" ]; then
            cp "$INDEX_TEMPLATE" tizen-app/index.html
          fi

          # Copy icon if available
          if [ -f "tizen/icons/icon.png" ]; then
            cp tizen/icons/icon.png tizen-app/icon.png
          fi

      - name: Build Package
        id: buildPackage
        run: |
          cd tizen-app
          ../tizen-studio/tools/ide/bin/tizen build-web -e ".*" -e gulpfile.js -e README.md -e "node_modules/*" -e "package*.json" -e "yarn.lock"

      - name: Prepare for password prompt
        if: success() || steps.buildPackage.conclusion == 'success'
        run: |
          sed -i "s|${GITHUB_WORKSPACE}/tizencert.pwd|1234|g" ${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml
          sed -i "s|${GITHUB_WORKSPACE}/tizen-studio-data/tools/certificate-generator/certificates/distributor/tizen-distributor-signer.pwd|tizenpkcs12passfordsigner|g" ${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml
          sed -i 's|password=""|password="tizenpkcs12passfordsigner"|g' ${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml

      - name: Package WGT
        if: success() || steps.buildPackage.conclusion == 'success'
        run: |
          mkdir -p tizen-app/release
          cd tizen-app
          expect ../package.exp "${GITHUB_WORKSPACE}/tizen-app" "${GITHUB_WORKSPACE}/tizen-app/release" "Stremio"

          # Rename the output .wgt to match the artifact name
          WGT_FILE=$(ls release/*.wgt 2>/dev/null | head -1)
          if [ -n "$WGT_FILE" ] && [ "$(basename "$WGT_FILE" .wgt)" != "${{ matrix.artifact_name }}" ]; then
            mv "$WGT_FILE" "release/${{ matrix.artifact_name }}.wgt"
          fi

      - name: Print logs
        if: always()
        run: cat ./tizen-studio-data/cli/logs/cli.log 2>/dev/null || echo "No CLI logs found"

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: tizen-app/release/${{ matrix.artifact_name }}.wgt
          retention-days: 5

  release:
    name: Publish the release
    runs-on: ubuntu-latest
    needs:
      - build
      - run-info

    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v8

      - name: List all directories
        run: ls -R

      - name: Check if any artifacts exist
        shell: bash
        run: |
          count=$(find . -type f -name '*.wgt' -printf x | wc -c)
          if [ $count -le 0 ]; then
            echo "::error title=NoWGT::No wgt files were built"
            exit 1
          fi

      - name: Generate checksums
        run: |
          for f in $(find . -name '*.wgt'); do
            sha256sum "$f" >> checksums.txt
          done
          cat checksums.txt

      - name: Release Build Result
        uses: softprops/action-gh-release@v2
        with:
          tag_name: '${{ needs.run-info.outputs.date_tag }}'
          name: '${{ needs.run-info.outputs.date }}'
          files: |
            **/*.wgt
            checksums.txt
          body: |
            ${{ github.event.inputs.rawMarkdown }}

            Look at the [readme](https://github.com/${{ github.repository }}/blob/main/README.md) for information about the different versions.

            ## Stable Version
            Stremio-Web: [${{ github.event.inputs.webReleaseTagName }}](https://github.com/Stremio/stremio-web/releases/tag/${{ github.event.inputs.webReleaseTagName }})

            ## Main Version
            Stremio-Web: [main](https://github.com/Stremio/stremio-web)

            ### Files

            | File | Description |
            |---|---|
            | `Stremio.wgt` | Built with the latest stable release of stremio-web |
            | `Stremio-main.wgt` | Built from the latest main branch (bleeding edge) |
            | `Stremio-secondary.wgt` | Stable with a different app ID for dual installs |
            | `Stremio-WebWrapper.wgt` | Lightweight iframe wrapper (no build, points to hosted app) |
            | `Stremio-Legacy.wgt` | Web wrapper for older Tizen 2.x-4.x TVs (2015-2018) |

            ### Checksums
            ```
            $(cat checksums.txt 2>/dev/null || echo "No checksums available")
            ```

            ### Installation
            See the [README](https://github.com/${{ github.repository }}#installation) for instructions.
          prerelease: ${{ github.event.inputs.prerelease }}
