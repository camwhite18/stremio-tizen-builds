name: Build Stremio Tizen

on:
  # Scheduled: check for upstream changes every 6 hours
  schedule:
    - cron: "0 */6 * * *"

  # Manual trigger
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force rebuild even if no upstream changes"
        required: false
        default: "false"
        type: boolean
      variants:
        description: "Variants to build (comma-separated, or 'all')"
        required: false
        default: "all"
        type: string

  # On push to main (for repo config changes)
  push:
    branches: [main]
    paths:
      - "tizen/**"
      - "scripts/**"
      - "matrix.json"
      - "patches/**"

permissions:
  contents: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      needs_rebuild: ${{ steps.check.outputs.needs_rebuild }}
      stable_version: ${{ steps.check.outputs.stable_version }}
      main_commit: ${{ steps.check.outputs.main_commit }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for upstream changes
        id: check
        run: |
          chmod +x scripts/check-updates.sh
          output=$(bash scripts/check-updates.sh)
          echo "$output"

          if echo "$output" | grep -q "NEEDS_REBUILD=true"; then
            echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ inputs.force_rebuild }}" == "true" ]]; then
            echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_rebuild=false" >> "$GITHUB_OUTPUT"
          fi

          # Fetch current versions for release notes
          stable=$(curl -sL https://api.github.com/repos/Stremio/stremio-web/releases/latest | jq -r '.tag_name // "unknown"')
          main=$(curl -sL https://api.github.com/repos/Stremio/stremio-web/commits/main | jq -r '.sha // "unknown"' | head -c 12)
          echo "stable_version=$stable" >> "$GITHUB_OUTPUT"
          echo "main_commit=$main" >> "$GITHUB_OUTPUT"

  build:
    needs: check-updates
    if: needs.check-updates.outputs.needs_rebuild == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zip expect

      - name: Build all variants
        run: |
          chmod +x scripts/build-all.sh
          bash scripts/build-all.sh

      - name: Generate checksums
        working-directory: output
        run: |
          for f in *.wgt; do
            sha256sum "$f" > "${f}.sha256"
            echo "sha256:$(cat "${f}.sha256" | awk '{print $1}')" >> checksums.txt
            echo "  $f" >> checksums.txt
          done

      - name: Create release tag
        id: tag
        run: |
          TAG=$(date -u +%Y-%m-%d-%H%M)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            Automated Stremio Tizen build.

            Look at the [README](https://github.com/${{ github.repository }}#versions) for information about the different versions.

            **Stremio-Web (stable):** ${{ needs.check-updates.outputs.stable_version }}
            **Stremio-Web (main):** ${{ needs.check-updates.outputs.main_commit }}

            ### Files

            | File | Description |
            |---|---|
            | `Stremio.wgt` | Built with the latest stable release of stremio-web |
            | `Stremio-main.wgt` | Built from the latest main branch (bleeding edge) |
            | `Stremio-secondary.wgt` | Stable with a different app ID for dual installs |
            | `Stremio-WebWrapper.wgt` | Lightweight iframe wrapper (no build, points to hosted app) |
            | `Stremio-Legacy.wgt` | Web wrapper for older Tizen 2.x–4.x TVs (2015–2018) |

            ### Checksums
            ```
            $(cat output/checksums.txt 2>/dev/null || echo "No checksums available")
            ```

            ### Installation
            See the [README](https://github.com/${{ github.repository }}#installation) or use the [Stremio2Samsung](https://github.com/stremio2samsung/stremio2samsung) installer.
          files: |
            output/*.wgt
            output/checksums.txt
          draft: false
          prerelease: false

      - name: Update versions.json
        run: |
          STABLE_VER="${{ needs.check-updates.outputs.stable_version }}"
          MAIN_COMMIT="${{ needs.check-updates.outputs.main_commit }}"
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          jq \
            --arg sv "$STABLE_VER" \
            --arg mc "$MAIN_COMMIT" \
            --arg now "$NOW" \
            '
              .stable.stremio_web_version = $sv |
              .stable.stremio_web_commit = $sv |
              .stable.built_at = $now |
              .main.stremio_web_commit = $mc |
              .main.built_at = $now |
              .secondary.stremio_web_version = $sv |
              .secondary.built_at = $now |
              .["web-wrapper"].built_at = $now |
              .legacy.built_at = $now
            ' versions.json > versions.json.tmp && mv versions.json.tmp versions.json

      - name: Commit updated versions.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git diff --cached --quiet || git commit -m "Update versions.json [skip ci]"
          git push || true
