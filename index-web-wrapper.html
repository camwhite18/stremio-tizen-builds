<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stremio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a2e; }
        #loading {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 100%);
            color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        #loading h1 { font-size: 36px; margin-bottom: 12px; }
        #loading p { font-size: 16px; opacity: 0.6; }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #7b5bf5; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin-top: 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }
        #error {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; background: #0a0a2e; color: #fff;
            font-family: sans-serif; text-align: center; padding: 40px;
        }
        #error h2 { color: #ff6b6b; margin-bottom: 16px; font-size: 28px; }
        #error p { opacity: 0.7; max-width: 600px; line-height: 1.6; font-size: 18px; }
        #retry-btn {
            margin-top: 32px; padding: 14px 40px; background: #7b5bf5; color: #fff;
            border: none; border-radius: 8px; font-size: 18px; cursor: pointer;
        }
        #retry-btn:focus { outline: 3px solid #fff; outline-offset: 2px; }
    </style>
</head>
<body>
    <div id="loading">
        <h1>Stremio</h1>
        <p>Loading your entertainment hub...</p>
        <div class="spinner"></div>
    </div>
    <div id="error">
        <h2>Connection Issue</h2>
        <p>Could not load Stremio. Check your internet connection and try again.</p>
        <button id="retry-btn" onclick="loadApp()">Retry</button>
    </div>
    <script>
        var STREMIO_URL = 'https://app.strem.io/shell-v4.4/';
        var loadTimeout;

        // Samsung TV remote key handling
        document.addEventListener('keydown', function(e) {
            switch(e.keyCode) {
                case 10009: // RETURN / BACK
                    if (document.getElementById('error').style.display === 'flex') {
                        try { tizen.application.getCurrentApplication().exit(); } catch(ex) {}
                    }
                    break;
                case 10182: // EXIT
                    try { tizen.application.getCurrentApplication().exit(); } catch(ex) {}
                    break;
            }
        });

        function loadApp() {
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('error').style.display = 'none';
            var old = document.querySelector('iframe');
            if (old) old.remove();

            var iframe = document.createElement('iframe');
            iframe.src = STREMIO_URL;
            iframe.allow = 'autoplay; fullscreen; encrypted-media';
            iframe.onload = function() {
                clearTimeout(loadTimeout);
                document.getElementById('loading').style.display = 'none';
            };
            iframe.onerror = function() { showError(); };
            loadTimeout = setTimeout(function() {}, 30000);
            document.body.appendChild(iframe);
        }

        function showError() {
            clearTimeout(loadTimeout);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'flex';
            document.getElementById('retry-btn').focus();
        }

        document.addEventListener('DOMContentLoaded', function() {
            try {
                tizen.tvinputdevice.registerKey('MediaPlayPause');
                tizen.tvinputdevice.registerKey('MediaPlay');
                tizen.tvinputdevice.registerKey('MediaPause');
                tizen.tvinputdevice.registerKey('MediaStop');
                tizen.tvinputdevice.registerKey('MediaRewind');
                tizen.tvinputdevice.registerKey('MediaFastForward');
            } catch(e) {}
            loadApp();
        });
    </script>
</body>
</html>
